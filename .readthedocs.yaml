version: 2

build:
  os: ubuntu-24.04
  tools:
    nodejs: "22"
  jobs:
    install:
      # Install Docusaurus dependencies
      - npm install
    build:
      html:
        # Build the site
        - npm run build
    post_build:
      # Expose the current RTD language build at the version root.
      # This is required so /<language>/latest/ has an index.html at root.
      - mkdir --parents $READTHEDOCS_OUTPUT/html/
      - cp --recursive build/${READTHEDOCS_LANGUAGE:-en}/latest/* $READTHEDOCS_OUTPUT/html/
