name: Docs build check

on:
  pull_request:
    paths:
      - "docs/**"
      - "i18n/**"
      - "src/**"
      - "static/**"
      - "docusaurus.config.js"
      - "sidebars.js"
      - "package.json"
      - "package-lock.json"

# Cancels in-progress runs if a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
